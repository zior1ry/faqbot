<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kopi & Co — Ask us anything</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1B1B1D; --paper:#F2E9D8; --ink:#1F3D3B; --stamp:#A63D40;
    --charcoal:#262421; --muted:#8B8680; --line:rgba(242,233,216,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--paper);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .mono{font-family:'Space Mono',monospace;}

  .widget{
    width:100%; max-width:420px;
    background:var(--paper); color:var(--charcoal);
    border-radius:8px; overflow:hidden;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);
    display:flex; flex-direction:column;
    height:640px;
  }
  .widget-head{
    background:var(--ink); color:var(--paper);
    padding:20px 22px;
  }
  .widget-head .eyebrow{
    font-family:'Space Mono',monospace; font-size:11px; letter-spacing:1.5px;
    text-transform:uppercase; opacity:0.7; margin-bottom:4px;
  }
  .widget-head h1{font-size:19px; font-weight:600;}

  .messages{
    flex:1; overflow-y:auto; padding:20px;
    display:flex; flex-direction:column; gap:12px;
  }
  .msg{
    max-width:80%; padding:11px 15px; border-radius:10px; font-size:14.5px; line-height:1.45;
  }
  .msg.bot{
    background:#E5DAC2; align-self:flex-start; border-bottom-left-radius:3px;
  }
  .msg.user{
    background:var(--ink); color:var(--paper); align-self:flex-end; border-bottom-right-radius:3px;
  }
  .msg.error{
    background:var(--stamp); color:var(--paper); align-self:flex-start;
  }
  .typing{
    align-self:flex-start; font-family:'Space Mono',monospace; font-size:12px; color:#8B8680;
    padding:4px 15px;
  }

  .suggestions{
    padding:0 20px 12px; display:flex; gap:8px; flex-wrap:wrap;
  }
  .chip{
    font-family:'Space Mono',monospace; font-size:12px;
    border:1px solid rgba(31,61,59,0.3); color:var(--ink);
    padding:6px 12px; border-radius:20px; background:transparent; cursor:pointer;
  }
  .chip:hover{background:rgba(31,61,59,0.08);}

  form{
    display:flex; gap:8px; padding:16px 20px; border-top:1px solid rgba(31,61,59,0.15);
    background:#EEE3CD;
  }
  input{
    flex:1; border:1px solid rgba(31,61,59,0.25); border-radius:20px;
    padding:11px 16px; font-size:14px; font-family:inherit; background:var(--paper);
    color:var(--charcoal);
  }
  input:focus-visible{outline:2px solid var(--ink); outline-offset:1px;}
  button[type=submit]{
    background:var(--stamp); color:var(--paper); border:none; border-radius:20px;
    padding:0 20px; font-family:'Space Mono',monospace; font-size:13px; cursor:pointer;
  }
  button[type=submit]:disabled{opacity:0.5; cursor:not-allowed;}
  button:focus-visible{outline:2px solid var(--paper); outline-offset:2px;}

  .footnote{
    text-align:center; font-family:'Space Mono',monospace; font-size:11px;
    color:var(--muted); margin-top:16px;
  }
</style>
</head>
<body>

<div>
  <div class="widget">
    <div class="widget-head">
      <div class="eyebrow">Ask Kopi &amp; Co</div>
      <h1>Hours, menu &amp; location — instantly.</h1>
    </div>
    <div class="messages" id="messages">
      <div class="msg bot">Hi! I'm Kopi &amp; Co's assistant. Ask me about our hours, menu, prices, or how to find us.</div>
    </div>
    <div class="suggestions">
      <button class="chip" type="button" data-q="What time do you open on weekends?">Weekend hours?</button>
      <button class="chip" type="button" data-q="Do you have nasi lemak?">Nasi lemak?</button>
      <button class="chip" type="button" data-q="Where are you located?">Location?</button>
    </div>
    <form id="chatForm">
      <input id="chatInput" type="text" placeholder="Type your question…" autocomplete="off" required />
      <button type="submit" id="sendBtn">Ask</button>
    </form>
  </div>
  <p class="footnote">Demo bot · powered by Claude · replies grounded only in shop-config.js</p>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  let history = [];

  function addMessage(text, role){
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addTyping(){
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.textContent = 'Kopi & Co is typing…';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping(){
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage(text){
    addMessage(text, 'user');
    history.push({ role: 'user', content: text });
    input.value = '';
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch('/.netlify/functions/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(0, -1) })
      });
      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        addMessage(data.error || 'Something went wrong. Please try again.', 'error');
        return;
      }

      addMessage(data.reply, 'bot');
      history.push({ role: 'assistant', content: data.reply });
    } catch (err) {
      removeTyping();
      addMessage('Connection error — check your network and try again.', 'error');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    sendMessage(text);
  });

  document.querySelectorAll('.chip').forEach((btn) => {
    btn.addEventListener('click', () => sendMessage(btn.dataset.q));
  });
</script>

</body>
</html>
